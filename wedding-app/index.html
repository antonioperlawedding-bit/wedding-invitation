      rel="stylesheet"

  <body style="margin:0;background:#faf8f0">
    <!-- Instant loading screen — visible before JS loads, removed by React -->
    <div id="preloader" style="position:fixed;inset:0;z-index:9999;background:#faf8f0;display:flex;align-items:center;justify-content:center">
      <!-- Themed spinner — sunflower-inspired rotating petals -->
      <svg width="56" height="56" viewBox="0 0 56 56" style="animation:spin-petals 2.4s linear infinite">
        <ellipse cx="28" cy="8" rx="3.5" ry="7" fill="#87A96B" opacity="0.3" transform="rotate(0 28 28)"/>
        <ellipse cx="28" cy="8" rx="3.5" ry="7" fill="#87A96B" opacity="0.39" transform="rotate(45 28 28)"/>
        <ellipse cx="28" cy="8" rx="3.5" ry="7" fill="#87A96B" opacity="0.48" transform="rotate(90 28 28)"/>
        <ellipse cx="28" cy="8" rx="3.5" ry="7" fill="#87A96B" opacity="0.56" transform="rotate(135 28 28)"/>
        <ellipse cx="28" cy="8" rx="3.5" ry="7" fill="#87A96B" opacity="0.65" transform="rotate(180 28 28)"/>
        <ellipse cx="28" cy="8" rx="3.5" ry="7" fill="#87A96B" opacity="0.74" transform="rotate(225 28 28)"/>
        <ellipse cx="28" cy="8" rx="3.5" ry="7" fill="#87A96B" opacity="0.83" transform="rotate(270 28 28)"/>
        <ellipse cx="28" cy="8" rx="3.5" ry="7" fill="#87A96B" opacity="1" transform="rotate(315 28 28)"/>
        <circle cx="28" cy="28" r="5" fill="#87A96B" opacity="0.6"/>
      </svg>
    </div>
    <style>
      @keyframes spin-petals { to { transform: rotate(360deg); } }
    </style>

    <div id="root"></div>
    <script>
      window.__loadStart = Date.now();
      // Create the audio element before React loads — only once per tab.
      // Strategy: start MUTED (universally allowed by all browsers without gesture),
      // then immediately unmute. This gives us gesture-free autoplay everywhere.
      if (!window.__audio) {
        var _a = new Audio('/music.mp3');
        _a.loop    = true;
        _a.volume  = 0.35;
        _a.muted   = true;   // muted = browsers always allow autoplay
        _a.preload = 'auto';
        window.__audio = _a;

        var _p = _a.play();
        if (_p) {
          _p.then(function () {
            // Playing (muted) — unmute immediately for audible playback
            _a.muted = false;
          }).catch(function () {
            // Even muted failed (iOS <16.4, very strict settings)
            // First interaction will unlock it
            _a.muted = false; // clear muted flag so next play() is audible
          });
        }

        // Fallback: on first ANY interaction, ensure audio is playing + unmuted
        function _unlock() {
          _a.muted = false;
          if (_a.paused) _a.play().catch(function () {});
        }
        ['click','touchstart','pointerdown','scroll','keydown'].forEach(function (ev) {
          document.addEventListener(ev, _unlock, { passive: true, once: true });
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
